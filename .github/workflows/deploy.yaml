name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to 'master' if that is your default branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
          # If your book requires extra plugins, you can add them here:
          # mdbook-plugins: 'mdbook-toc, mdbook-admonish'

      - name: Build with mdBook
        run: mdbook build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book # This is the default output directory for mdbook

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4